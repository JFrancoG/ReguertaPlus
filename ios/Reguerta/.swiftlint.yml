included:
  - Reguerta
  - ReguertaTests
  - ReguertaUITests

excluded:
  - Reguerta.xcodeproj
  - Reguerta.xcworkspace
  - .build
  - DerivedData
  - Pods

line_length:
  warning: 160
  error: 200

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 400

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 48
    error: 80

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 56
    error: 64

reporter: "xcode"
